<!DOCTYPE html>
<html>
<head>
    <title>Even or Odd</title>
</head>
<body>

    <h2>Even or Odd</h2>
    
    <input type="number" id="userInput" placeholder="Enter a number">
    
    <button onclick="checkEvenOdd()">Check</button>

    <p id="result"></p>

    <script>
    
        function checkEvenOdd() {
        
            let n = document.getElementById("userInput").value;
            
        
            let display = document.getElementById("result");

        
            if (n === "") {
                display.textContent = "Please enter a number";
                return;
            }

        
            if (n % 2 === 0) {
                display.textContent = n + " is an Even number";
            } else {
                display.textContent = n + " is an Odd number";
            }
        }
    </script>

</body>
</html>
