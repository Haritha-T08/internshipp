<!DOCTYPE html>
<html>
<body><head>
    <title>items</title>
</head>

    <h1>My Items</h1>
    <ul id="myList"></ul>

    <script>
        
        const items = ["Lion", "tiger", "cat", "dog"];

    
        const listContainer = document.getElementById("myList");

        items.forEach(function(singleItem) {

            let li = document.createElement("li");
            
            li.textContent = singleItem;
            
        
            listContainer.appendChild(li);
        });
    </script>

</body>
</html>
